<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, initial-scale=1.0">
    <title>任务栏歌词设置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
            font-size: 13px;
            color: #333;
            background: #fff;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e8e8;
        }
        .header h1 {
            font-size: 15px;
            font-weight: 600;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.on { background: #52c41a; }
        .status-dot.off { background: #ff4d4f; }
        .section {
            margin-bottom: 14px;
        }
        .section-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .control-row label {
            flex: 1;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        button {
            padding: 6px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        button:hover {
            border-color: #1890ff;
            color: #1890ff;
        }
        button.primary {
            background: #1890ff;
            color: #fff;
            border-color: #1890ff;
        }
        button.primary:hover {
            background: #40a9ff;
        }
        button.danger {
            color: #ff4d4f;
            border-color: #ff4d4f;
        }
        button.danger:hover {
            background: #ff4d4f;
            color: #fff;
        }
        .current-lyric {
            padding: 8px 10px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
            min-height: 20px;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .footer {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #e8e8e8;
            text-align: center;
            font-size: 11px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="status-dot off" id="statusDot"></span>
        <h1>任务栏歌词</h1>
        <span id="statusText" style="font-size:11px;color:#888;margin-left:auto;">等待连接</span>
    </div>

    <div class="section">
        <div class="section-title">任务栏歌词程序</div>
        <div class="control-row">
            <label>歌词程序状态</label>
            <span id="processStatus" style="color:#ff4d4f;">未运行</span>
        </div>
    </div>

    <div class="section">
        <div class="section-title">播放控制</div>
        <div class="btn-group">
            <button id="btnPrev">⏮ 上一首</button>
            <button id="btnToggle">⏯ 播放/暂停</button>
            <button id="btnNext">⏭ 下一首</button>
        </div>
    </div>

<div class="section">
        <div class="section-title">连接</div>
        <div class="control-row">
            <label>WebSocket 状态</label>
            <span id="wsStatus" style="color:#ff4d4f;">未连接</span>
        </div>
        <div class="btn-group">
            <button id="btnReconnect" class="primary">重新连接</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">使用教程</div>
        <div style="font-size:11px; line-height:1.8; color:#666;">
            <p><strong>在插件市场安装此插件后授予权限即可，其余操作无需额外配置，本插件会自动配置。</strong></p>
        </div>
    </div>

    <div class="footer">
        MoeKoe Taskbar Lyrics v0.4.0 (Native Host)
    </div>

    <div id="diagPanel" style="margin-top:10px;padding:8px;background:#fffbe6;border:1px solid #ffe58f;border-radius:4px;font-size:11px;color:#666;display:none;word-break:break-all;">
        <strong style="color:#d48806;">环境诊断</strong>
        <pre id="diagText" style="margin-top:4px;white-space:pre-wrap;"></pre>
    </div>

    <script src="popup.js"></script>
</body>
</html>

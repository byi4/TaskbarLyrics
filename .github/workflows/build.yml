name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (using system vcpkg, auto-retry on network issues)
        shell: powershell
        run: |
          $maxRetries = 3
          for ($i = 0; $i -lt $maxRetries; $i++) {
              vcpkg install --classic --triplet x64-windows --x-install-root="${{ github.workspace }}\vcpkg_installed" ixwebsocket nlohmann-json zlib mbedtls
              if ($LASTEXITCODE -eq 0) { Write-Host "All dependencies installed successfully!"; break }
              Write-Host "Installation failed (attempt $($i+1)/$maxRetries). Retrying in 5 seconds..."
              Start-Sleep -Seconds 5
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            "-DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed\x64-windows" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoeKoeTaskbarLyrics-x64
          path: |
            build/Release/MoeKoeTaskbarLyrics.exe
            build/Release/WebView2Loader.dll
            build/Release/z.dll
            resources/settings.html
            resources/icon.ico

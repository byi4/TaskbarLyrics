name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache vcpkg and dependencies
        uses: actions/cache@v4
        id: cache-vcpkg
        with:
          path: |
            vcpkg
            vcpkg_installed
          key: vcpkg-windows-x64-20250423

      - name: Clone vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git --depth=1

      - name: Bootstrap vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $env:VCPKG_ROOT = ""
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics

      - name: Install dependencies
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $env:VCPKG_ROOT = ""
          cd vcpkg
          $vcpkgRoot = (Get-Location).Path
          .\vcpkg.exe install --triplet x64-windows --vcpkg-root="$vcpkgRoot" ixwebsocket nlohmann-json zlib mbedtls

      - name: Configure CMake
        shell: powershell
        run: |
          $env:VCPKG_ROOT = ""
          $vcpkgInstalled = "${{ github.workspace }}\vcpkg\installed\x64-windows"
          cmake -B build -S . `
            "-DVCPKG_INSTALLED_DIR=$vcpkgInstalled" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoeKoeTaskbarLyrics-x64
          path: |
            build/Release/MoeKoeTaskbarLyrics.exe
            build/Release/WebView2Loader.dll
            build/Release/z.dll
            resources/settings.html
            resources/icon.ico
